# ============================================================================
# Paranormal Pulse — iOS build + App Store submission (Codemagic, cloud Mac)
# No Mac needed on your end. Codemagic runs this on their macOS machines.
# Automatic code signing: creates the distribution certificate + provisioning
# profile on the fly from the App Store Connect API key (integration below).
# ============================================================================
workflows:
  ios-paranormal-pulse:
    name: Paranormal Pulse iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: ParanormalPulse_ASC      # <- name of your API key in Codemagic
    environment:
      vars:
        BUNDLE_ID: "com.paranormalpulse.app"
        XCODE_SCHEME: "App"
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install JS dependencies
        script: npm install
      - name: Generate the iOS project (Capacitor)
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: Set Info.plist usage strings + display name
        script: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSMotionUsageDescription string 'Uses motion sensors to drive playful in-game effects. For entertainment only.'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSMotionUsageDescription 'Uses motion sensors to drive playful in-game effects. For entertainment only.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Shows the live camera and playful color filters in the game. For entertainment only.'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription 'Shows the live camera and playful color filters in the game. For entertainment only.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 'Records and plays back audio clips as part of the game. For entertainment only.'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSMicrophoneUsageDescription 'Records and plays back audio clips as part of the game. For entertainment only.'" "$PLIST"
          # App only uses standard HTTPS encryption -> exempt. Declaring it here auto-skips
          # the TestFlight/App Store "export compliance" prompt on every build.
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"
          # Unique, auto-incrementing build number (App Store Connect rejects a reused one).
          LATEST=$(app-store-connect get-latest-testflight-build-number 6780322819 2>/dev/null || echo 0)
          NEW=$(( ${LATEST:-0} + 1 ))
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $NEW" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $NEW" "$PLIST"
          echo "CFBundleVersion set to $NEW (latest in App Store Connect was ${LATEST:-0})"
      - name: Add the native magnetometer plugin to the iOS app target
        script: |
          # Copies the real-EMF plugin into the generated iOS app and adds it to the build.
          cp plugins/iOS_MagnetometerPlugin.swift ios/App/App/MagnetometerPlugin.swift
          cp plugins/iOS_MagnetometerPlugin.m     ios/App/App/MagnetometerPlugin.m
          # add_ios_source.rb uses the 'xcodeproj' gem to register the two files in App target
          gem install xcodeproj >/dev/null 2>&1 || sudo gem install xcodeproj
          ruby add_ios_source.rb
          npx cap sync ios
      - name: Set the app icon (Paranormal Pulse pulse icon)
        script: |
          # Inject the real app icon into the generated iOS asset catalog.
          # Capacitor's `cap add ios` ships a placeholder/default icon; this replaces it
          # with app-icon-1024.png (1024x1024, opaque, square) from the repo root.
          ICONSET="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          echo "=== AppIcon.appiconset BEFORE ==="
          ls -la "$ICONSET" || true
          cat "$ICONSET/Contents.json" 2>/dev/null || true
          # Overwrite every png in the iconset with our 1024 marketing icon.
          # (Capacitor 6/7 uses a single 1024 'ios-marketing' icon; copying to all is safe.)
          for f in "$ICONSET"/*.png; do cp app-icon-1024.png "$f" && echo "replaced $f"; done
          # If the set was empty for some reason, drop the icon in under the standard name.
          [ -e "$ICONSET/AppIcon-512@2x.png" ] || cp app-icon-1024.png "$ICONSET/AppIcon-512@2x.png"
          echo "=== AppIcon.appiconset AFTER ==="
          ls -la "$ICONSET"
      - name: Set up code signing (clean stale certs + create fresh)
        script: |
          keychain initialize
          # Wipe ALL existing distribution certs + provisioning profiles first. The CI
          # machine can't reuse them (ephemeral keys), and stale ones break the signing
          # match ("Did not find matching provisioning profiles"). Dedicated account, one
          # app, so a clean slate every build is safe. `|| true` keeps cleanup non-fatal.
          echo "=== existing certificates (all types) ==="
          app-store-connect list-certificates --json | tee /tmp/c.json || echo "[]" > /tmp/c.json
          python3 -c "import json;d=json.load(open('/tmp/c.json'));d=d.get('data',d) if isinstance(d,dict) else d;print(' '.join(x.get('id','') for x in (d or []) if isinstance(x,dict)))" > /tmp/cids.txt 2>/dev/null || true
          for ID in $(cat /tmp/cids.txt 2>/dev/null); do echo "revoking cert $ID"; app-store-connect delete-certificate "$ID" || true; done
          echo "=== existing provisioning profiles ==="
          app-store-connect list-profiles --json | tee /tmp/p.json || echo "[]" > /tmp/p.json
          python3 -c "import json;d=json.load(open('/tmp/p.json'));d=d.get('data',d) if isinstance(d,dict) else d;print(' '.join(x.get('id','') for x in (d or []) if isinstance(x,dict)))" > /tmp/pids.txt 2>/dev/null || true
          for ID in $(cat /tmp/pids.txt 2>/dev/null); do echo "deleting profile $ID"; app-store-connect delete-profile "$ID" || true; done
          # Generate a fresh private key, then create one new distribution certificate
          # (using that key) + the App Store provisioning profile for the bundle id.
          openssl genrsa -out /tmp/cert_key.pem 2048
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @file:/tmp/cert_key.pem \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build .ipa
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true       # lands in TestFlight; promote to App Store review from App Store Connect
