# ============================================================================
# Paranormal Pulse — iOS build + App Store submission (Codemagic, cloud Mac)
# No Mac needed on your end. Codemagic runs this on their macOS machines.
# Automatic code signing: creates the distribution certificate + provisioning
# profile on the fly from the App Store Connect API key (integration below).
# ============================================================================
workflows:
  ios-paranormal-pulse:
    name: Paranormal Pulse iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: ParanormalPulse_ASC      # <- name of your API key in Codemagic
    environment:
      vars:
        BUNDLE_ID: "com.paranormalpulse.app"
        XCODE_SCHEME: "App"
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install JS dependencies
        script: npm install
      - name: Generate the iOS project (Capacitor)
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: Set Info.plist usage strings + display name
        script: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSMotionUsageDescription string 'Measures magnetic-field (EMF) changes during investigations.'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSMotionUsageDescription 'Measures magnetic-field (EMF) changes during investigations.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Shows the live camera and thermal view during investigations.'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription 'Shows the live camera and thermal view during investigations.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 'Records audio for EVP review and audio anomaly detection.'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSMicrophoneUsageDescription 'Records audio for EVP review and audio anomaly detection.'" "$PLIST"
          # App only uses standard HTTPS encryption -> exempt. Declaring it here auto-skips
          # the TestFlight/App Store "export compliance" prompt on every build.
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"
          # Unique, auto-incrementing build number (App Store Connect rejects a reused one).
          LATEST=$(app-store-connect get-latest-testflight-build-number 6780322819 2>/dev/null || echo 0)
          NEW=$(( ${LATEST:-0} + 1 ))
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $NEW" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $NEW" "$PLIST"
          echo "CFBundleVersion set to $NEW (latest in App Store Connect was ${LATEST:-0})"
      - name: Add the native magnetometer plugin to the iOS app target
        script: |
          # Copies the real-EMF plugin into the generated iOS app and adds it to the build.
          cp plugins/iOS_MagnetometerPlugin.swift ios/App/App/MagnetometerPlugin.swift
          cp plugins/iOS_MagnetometerPlugin.m     ios/App/App/MagnetometerPlugin.m
          # add_ios_source.rb uses the 'xcodeproj' gem to register the two files in App target
          gem install xcodeproj >/dev/null 2>&1 || sudo gem install xcodeproj
          ruby add_ios_source.rb
          npx cap sync ios
      - name: Set up code signing (clean stale certs + create fresh)
        script: |
          keychain initialize
          # Revoke any existing iOS distribution certificates first. The CI machine can't
          # reuse them (their private keys are ephemeral), and stale certs break the
          # profile match ("Did not find matching provisioning profiles") and eventually
          # hit Apple's certificate cap. The API key has admin rights to do this.
          app-store-connect list-certificates --type IOS_DISTRIBUTION --json 2>/dev/null | python3 -c "import sys,json;d=json.load(sys.stdin);d=d.get('data',d) if isinstance(d,dict) else d;print('\n'.join(c['id'] for c in (d or []) if isinstance(c,dict) and c.get('id')))" 2>/dev/null | while read CID; do [ -n "$CID" ] && app-store-connect delete-certificate "$CID" || true; done
          # Generate a fresh private key, then create one new distribution certificate
          # (using that key) + the App Store provisioning profile for the bundle id.
          openssl genrsa -out /tmp/cert_key.pem 2048
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @file:/tmp/cert_key.pem \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build .ipa
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true       # lands in TestFlight; promote to App Store review from App Store Connect
